basePath: /api
definitions:
  models.Tool:
    properties:
      active_users_count:
        type: integer
      affiliate_link:
        type: string
      budget_level:
        type: string
      category:
        type: string
      id:
        type: integer
      is_sponsored:
        type: boolean
      launched_year:
        type: integer
      name:
        type: string
      pricing_model:
        type: string
      rating:
        type: number
      short_description:
        type: string
      slug:
        type: string
      supported_os:
        type: string
      website_link:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: AI-powered software discovery platform API
  title: BuilderStack API
  version: "1.0"
paths:
  /:
    get:
      description: Returns server running status
      produces:
      - text/plain
      responses:
        "200":
          description: Server is running
          schema:
            type: string
      summary: Health check
      tags:
      - health
  /tools:
    get:
      description: Get all tools from the database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Tool'
            type: array
        "500":
          description: Failed to fetch tools
          schema:
            type: string
      summary: List all tools
      tags:
      - tools
    post:
      consumes:
      - application/json
      description: Create a new tool in the database
      parameters:
      - description: Tool to create
        in: body
        name: tool
        required: true
        schema:
          $ref: '#/definitions/models.Tool'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Tool'
        "400":
          description: Invalid JSON or missing required fields
          schema:
            type: string
        "500":
          description: Failed to create tool
          schema:
            type: string
      summary: Create a tool
      tags:
      - tools
  /tools/{id}:
    delete:
      description: Delete a tool by its ID
      parameters:
      - description: Tool ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Tool deleted successfully
          schema:
            type: object
        "400":
          description: Invalid tool ID
          schema:
            type: string
        "404":
          description: Tool not found
          schema:
            type: string
        "500":
          description: Failed to delete tool
          schema:
            type: string
      summary: Delete a tool
      tags:
      - tools
    get:
      description: Get a single tool by its ID
      parameters:
      - description: Tool ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Tool'
        "400":
          description: Invalid tool ID
          schema:
            type: string
        "404":
          description: Tool not found
          schema:
            type: string
        "500":
          description: Database error
          schema:
            type: string
      summary: Get tool by ID
      tags:
      - tools
    put:
      consumes:
      - application/json
      description: Update a tool by its ID
      parameters:
      - description: Tool ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated tool data
        in: body
        name: tool
        required: true
        schema:
          $ref: '#/definitions/models.Tool'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Tool'
        "400":
          description: Invalid ID or JSON
          schema:
            type: string
        "404":
          description: Tool not found
          schema:
            type: string
        "409":
          description: Slug already exists
          schema:
            type: string
        "500":
          description: Failed to update tool
          schema:
            type: string
      summary: Update a tool
      tags:
      - tools
swagger: "2.0"
