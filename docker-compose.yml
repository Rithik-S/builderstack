services:
  db:
    image: postgres:15
    container_name: builderstack_postgres
    environment:
      POSTGRES_USER: builderstack_user
      POSTGRES_PASSWORD: builderstack_secret
      POSTGRES_DB: builderstack_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U builderstack_user -d builderstack_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: